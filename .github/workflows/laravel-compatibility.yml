name: Laravel Compatibility

on:
    push:
        branches: [master, dev]
    pull_request:

jobs:
    tests:
        name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                include:
                    - php: "8.1"
                      laravel: "10.0"
                      testbench: "9.0"
                      phpunit: "^10.0"
                    - php: "8.2"
                      laravel: "11.0"
                      testbench: "10.0"
                      phpunit: "^11.0"
                    - php: "8.2"
                      laravel: "12.0"
                      testbench: "10.0"
                      phpunit: "^11.0"
                    - php: "8.3"
                      laravel: "13.0"
                      testbench: "11.0"
                      phpunit: "^11.0"

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  tools: composer:v2
                  coverage: none

            - name: Validate composer.json
              run: composer validate --strict

            - name: Set framework versions for matrix
              run: |
                  composer require --dev --no-interaction --no-update \
                    "illuminate/support:^${{ matrix.laravel }}" \
                    "orchestra/testbench:^${{ matrix.testbench }}" \
                    "phpunit/phpunit:${{ matrix.phpunit }}"

            - name: Install dependencies
              run: composer update --prefer-dist --no-interaction

            - name: Run tests
              run: vendor/bin/phpunit --colors=never
